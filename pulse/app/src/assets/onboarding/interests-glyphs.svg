<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" fill="none" aria-hidden="true">
  <!-- Constellation of editorial serif glyphs. Decorative accent for the
       interests step; the actual selectable chips render their own glyphs
       inline so the user can interact. Uses Instrument Serif via the
       inherited @font-face stack. -->
  <g font-family="Instrument Serif, Georgia, serif" text-anchor="middle">
    <!-- Faint connector lines -->
    <g stroke="var(--pulse-accent-soft)" stroke-width="1" opacity="0.7">
      <line x1="62" y1="78" x2="138" y2="40"/>
      <line x1="138" y1="40" x2="226" y2="74"/>
      <line x1="226" y1="74" x2="276" y2="148"/>
      <line x1="276" y1="148" x2="222" y2="220"/>
      <line x1="222" y1="220" x2="100" y2="232"/>
      <line x1="100" y1="232" x2="44" y2="160"/>
      <line x1="44" y1="160" x2="62" y2="78"/>
      <line x1="160" y1="140" x2="138" y2="40"/>
      <line x1="160" y1="140" x2="226" y2="74"/>
      <line x1="160" y1="140" x2="100" y2="232"/>
    </g>
    <!-- Glyph nodes -->
    <g fill="var(--pulse-accent-strong)" font-size="34" font-style="italic">
      <text x="62" y="88">♪</text>
      <text x="138" y="50">P</text>
      <text x="226" y="84">f</text>
      <text x="276" y="158">A</text>
    </g>
    <g fill="var(--pulse-accent)" font-size="30" font-style="italic">
      <text x="222" y="230">t</text>
      <text x="100" y="242">N</text>
      <text x="44" y="170">o</text>
      <text x="160" y="150">★</text>
    </g>
  </g>
</svg>
