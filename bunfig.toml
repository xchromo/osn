[install]
# Supply-chain hardening: refuse to install any package version published less
# than 3 days ago. Reduces exposure to freshly published malicious versions
# (the typical npm-account-takeover window is hours-to-days). Three days lets
# security tooling and other maintainers notice and yank a compromised
# release before it lands in our lockfile, while still letting us pick up
# patches reasonably quickly.
#
# Value is in seconds; bun supports this in `bunfig.toml` from 1.2.x onward.
# 3 days = 3 × 24 × 60 × 60 = 259_200 seconds.
minimumReleaseAge = 259200
