[install]
# Supply-chain hardening: refuse to install any package version published less
# than 14 days ago. Reduces exposure to freshly published malicious versions
# (the typical npm-account-takeover window is hours-to-days). Two weeks gives
# the registry, security tooling, and other maintainers time to notice and
# yank a compromised release before it lands in our lockfile.
#
# Value is in seconds; bun supports this in `bunfig.toml` from 1.2.x onward.
# 14 days = 14 × 24 × 60 × 60 = 1_209_600 seconds.
minimumReleaseAge = 1209600
