pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: bunx --bun oxlint -c oxlintrc.json {staged_files}
    format:
      glob: "*.{js,jsx,ts,tsx}"
      run: bunx --bun oxfmt {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: bun run check
