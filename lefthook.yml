pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: bunx --bun oxlint -c oxlintrc.json {staged_files}
    format:
      glob: "*.{js,jsx,ts,tsx}"
      run: bunx --bun oxfmt {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      # Guarded wrapper, not `bun run check` directly: a worktree made with
      # `git worktree add` has no `node_modules`, so `turbo` is absent and the
      # hook failed with exit 127 — which reads like a type error and pushes
      # people towards `LEFTHOOK=0`. The script installs first when it must.
      run: bash scripts/pre-push-typecheck.sh
    audit:
      # Refuse to push if any installed package has a `high` or `critical`
      # advisory. Pairs with `bunfig.toml`'s `minimumReleaseAge` — one stops
      # fresh malice, this one stops known malice.
      #
      # No --ignore entries: the prior ws/vite dev-tooling advisories
      # (GHSA-96hv-2xvq-fx4p, GHSA-fx2h-pf6j-xcff) were cleared by the #214
      # dependency sweep (root overrides ws ≥8.21.0, vite ≥7.3.5). Re-add an
      # entry here ONLY to temporarily accept a NEW high/critical advisory
      # that's confirmed unreachable in any deployed Worker / production path,
      # and note its drop-trigger inline — then prune it once upstream ships.
      run: bun audit --audit-level=high
