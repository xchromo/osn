pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: bunx oxlint --ignore-pattern '*.astro' {staged_files}
    format:
      run: bunx oxfmt {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun run build
    test:
      run: bun run test
