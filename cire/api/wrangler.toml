name = "cire-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Refuse to publish the top-level (env-less) config to a *.workers.dev URL. This
# block carries the PRODUCTION D1 binding but a local security posture
# (WEB_ORIGIN=localhost, no prod secrets), so a bare `wrangler deploy` would
# otherwise create a public shadow Worker with full read/write on prod guest
# PII. With no top-level routes, a bare deploy now fails loudly. Real deploys go
# through `--env production` (custom_domain routes below); CI's
# `d1 migrations apply` still uses this block's DB binding and is unaffected.
workers_dev = false

# Scheduled expired-session sweep (C-M2/C-M15). Daily 04:00 UTC — off-peak for
# the AU/EU guest audience, low contention with normal traffic. Sessions carry
# a 30-day TTL so once-a-day pruning bounds the dead-row backlog to <1 day.
[triggers]
crons = ["0 4 * * *"]

# Cloudflare Workers Logs / invocations. `enabled = true` persists the Worker's
# logs (and invocation records) for 7 days, viewable in the dashboard under
# Workers & Pages → cire-api → Observability / Logs. Free + low-overhead.
# `head_sampling_rate = 1` logs 100% of requests — correct at our current low
# volume; drop it (e.g. 0.1) only if we ever approach the Workers Logs daily
# ingest cap. See [[wiki/runbooks/free-tier-limits]] (Monitoring section).
# Named environments do NOT inherit this top-level block — it is redeclared
# under [env.production.observability] below.
[observability]
enabled = true
head_sampling_rate = 1

[vars]
WEB_ORIGIN = "http://localhost:4321"
OSN_JWKS_URL = "http://localhost:4000/.well-known/jwks.json"
OSN_ISSUER_URL = "http://localhost:4000"
OSN_AUDIENCE = "osn-access"
ZAP_API_URL = "http://localhost:3002"

# ── GrowthBook feature flags (KEY-OPTIONAL) ──────────────────────────────────
# GROWTHBOOK_CLIENT_KEY UNSET ⇒ @shared/feature-flags serves every flag's coded
# default (src/index.ts FLAGS registry) with ZERO network — the state before a
# GrowthBook account exists, so this ships safely inert. Set the key to activate
# live evaluation. The SDK client key is low-sensitivity (it authorises reading
# the public feature payload, not writing), so it can live as a [vars] entry OR
# a secret — use a secret if you'd rather keep it out of git:
#   bunx wrangler secret put GROWTHBOOK_CLIENT_KEY --env production
# GROWTHBOOK_API_HOST defaults to https://cdn.growthbook.io in code; pinned here
# for clarity and to make a self-hosted/proxy swap a one-line change.
GROWTHBOOK_API_HOST = "https://cdn.growthbook.io"
# GROWTHBOOK_CLIENT_KEY = "sdk-xxxxxxxx"   # set after creating the GrowthBook SDK connection

# Native Cloudflare Workers Rate Limiting binding for the pre-auth claim
# endpoint (C1/C4). Enforced globally + atomically at the edge — unlike the
# per-isolate in-memory limiter it replaces. `simple.limit`/`simple.period`
# mirror the in-memory default (5 attempts / 60s); `period` must be 10 or 60.
# `namespace_id` is an arbitrary stable integer scoping this limiter; bump it
# only to deliberately reset the counter namespace.
[[unsafe.bindings]]
name = "CLAIM_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[d1_databases]]
binding = "DB"
database_name = "cire-db"
database_id = "6e835474-e0a7-4db9-8883-3247c3c891cd"
migrations_dir = "../db/migrations"

# R2 bucket used by the organiser spreadsheet import flow to stash the raw
# uploaded sheet alongside its parsed `imports` row. Bucket must be created
# before first deploy:
#   bunx wrangler r2 bucket create cire-sheets
#   bunx wrangler r2 bucket create cire-sheets-preview
[[r2_buckets]]
binding = "SHEETS"
bucket_name = "cire-sheets"
preview_bucket_name = "cire-sheets-preview"

# R2 bucket for invite-builder images (hero / story photos). Separate from
# SHEETS: binary content, served publicly through the API, different retention.
# Bucket must be created before first deploy:
#   bunx wrangler r2 bucket create cire-assets
#   bunx wrangler r2 bucket create cire-assets-preview
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "cire-assets"
preview_bucket_name = "cire-assets-preview"

# Cloudflare Images binding — transforms the R2 invite-image originals into
# responsive, modern-format (WebP/AVIF) variants on the public serve path
# (GET /api/invite/:slug/image/:slot). The serve route falls back to the raw R2
# bytes when this binding is absent (local `wrangler dev` / miniflare / tests) or
# a transform fails, so it never 500s on a transform miss. The Images product
# must be enabled on the Cloudflare account before deploy (transformations are
# billed per unique transformation — see the human note in the PR).
[images]
binding = "IMAGES"

# ── GrowthBook payload cache (OPTIONAL) ──────────────────────────────────────
# Cross-isolate cache for the GrowthBook SDK payload. ABSENT ⇒ each isolate keeps
# its own in-memory cache (still correct — just re-fetches once per cold isolate
# per TTL). Present ⇒ isolates share one cached payload, cutting CDN fetches. The
# feature-flag helper degrades gracefully either way, so this is a pure
# optimisation. Create the namespace then uncomment with the real id:
#   bunx wrangler kv namespace create KV_GB_PAYLOAD
# [[kv_namespaces]]
# binding = "KV_GB_PAYLOAD"
# id = "<paste-namespace-id>"

[env.production.vars]
# Comma-separated allowlist (index.ts splits on "," and trims). Entry 0 is the
# guest site (`invite.cireweddings.com`); the organiser portal origin
# (`host.cireweddings.com`) MUST also be present or organiser writes to
# /api/organiser/* fail the CORS origin guard with 403.
# Domain reshuffle 2026-07-16: guest → `invite.`, organiser → `host.`, apex →
# landing. Only the two origins that call this API remain: the guest site
# (`invite.`) and the organiser portal (`host.`). The transitional `cireweddings.com`
# (apex — now the static marketing landing, makes no API calls) and
# `app.cireweddings.com` (old organiser origin) were pruned after the cutover.
WEB_ORIGIN = "https://invite.cireweddings.com,https://host.cireweddings.com,https://vendor.cireweddings.com"
# OSN identity (osn-api) prod origin — served on the cireweddings.com zone at
# id.cireweddings.com. OSN_ISSUER_URL MUST equal osn-api's own OSN_ISSUER_URL or
# access-token verification fails; OSN_JWKS_URL is that origin + the JWKS path.
OSN_JWKS_URL = "https://id.cireweddings.com/.well-known/jwks.json"
OSN_ISSUER_URL = "https://id.cireweddings.com"
OSN_AUDIENCE = "osn-access"
ZAP_API_URL = "https://zap.cireweddings.com"
# GrowthBook feature flags (KEY-OPTIONAL) — see the top-level [vars] note. Named
# envs do NOT inherit top-level [vars], so GROWTHBOOK_API_HOST is redeclared
# here; set GROWTHBOOK_CLIENT_KEY (var or `wrangler secret put ... --env
# production`) to activate live evaluation in prod.
GROWTHBOOK_API_HOST = "https://cdn.growthbook.io"
# GROWTHBOOK_CLIENT_KEY = "sdk-xxxxxxxx"
# OSN_ENV — deployment tier (dev|staging|production). Drives the structured-log
# level (see src/observability.ts); debug logs are local-only. Set it as a var
# or secret per environment. No bootstrap-owner config is needed: every
# authenticated OSN user is a first-class organiser who creates their own
# weddings via POST /api/organiser/weddings, with per-wedding access scoped by
# weddingOwner()/weddingMember() — there is no global boot gate or seeded owner.

# Custom-domain route: serves cire-api on api.cireweddings.com. `custom_domain =
# true` auto-provisions DNS + edge cert because the cireweddings.com zone is in
# this Cloudflare account. Named envs do NOT inherit top-level routes, so this
# applies only to `wrangler deploy --env production`.
[[env.production.routes]]
pattern = "api.cireweddings.com"
custom_domain = true

# Wrangler named environments do NOT inherit top-level [[d1_databases]] /
# [[r2_buckets]] / [[unsafe.bindings]] — they must be redeclared per-env.
# Without these, `wrangler deploy --env production` ships with no DB/R2 (worker
# fail-closes 503 at index.ts) and no CLAIM_RATE_LIMITER (the claim endpoint
# loses its edge rate limit). Keep these in sync with the top-level bindings.
[[env.production.unsafe.bindings]]
name = "CLAIM_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[env.production.d1_databases]]
binding = "DB"
database_name = "cire-db"
database_id = "6e835474-e0a7-4db9-8883-3247c3c891cd"
migrations_dir = "../db/migrations"

[[env.production.r2_buckets]]
binding = "SHEETS"
bucket_name = "cire-sheets"
preview_bucket_name = "cire-sheets-preview"

[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "cire-assets"
preview_bucket_name = "cire-assets-preview"

# Mirror of the top-level [images] binding — named environments do NOT inherit
# top-level bindings (see the binding-inheritance note above), so the Images
# binding must be redeclared here or `wrangler deploy --env production` ships
# without it and every serve falls back to the un-transformed R2 original.
[env.production.images]
binding = "IMAGES"

# Mirror of the top-level GrowthBook payload cache (OPTIONAL) — named envs do NOT
# inherit top-level [[kv_namespaces]]. Uncomment with the same namespace id (or a
# separate prod namespace) once created. Absent ⇒ per-isolate in-memory cache.
# [[env.production.kv_namespaces]]
# binding = "KV_GB_PAYLOAD"
# id = "<paste-namespace-id>"

# Mirror of the top-level [observability] block — named environments do NOT
# inherit it, so without this the production Worker ships with logs disabled.
[env.production.observability]
enabled = true
head_sampling_rate = 1

# ── OpenTelemetry export ─────────────────────────────────────────────────────
# Read by `@shared/observability` `loadConfig` (workerd `nodejs_compat`
# populates `process.env` from these [vars] + secrets). With the endpoint UNSET,
# tracing + metrics are a true no-op (zero export attempts) — so leaving this
# commented out keeps local/dev safe. Set the base OTLP/HTTP endpoint to turn
# export on; `@shared/observability` appends `/v1/traces` + `/v1/metrics` itself.
#
#   OTEL_SERVICE_NAME            non-secret, can live in [vars] (defaults to "cire-api")
#   OTEL_EXPORTER_OTLP_ENDPOINT  non-secret base URL, e.g. Grafana Cloud OTLP gateway
#   OTEL_EXPORTER_OTLP_HEADERS   SECRET — carries the auth token, never commit it
#
# Non-secret placeholders (uncomment + set the real endpoint before deploy):
#   OTEL_SERVICE_NAME = "cire-api"
#   OTEL_EXPORTER_OTLP_ENDPOINT = "https://otlp-gateway-<region>.grafana.net/otlp"
#
# The headers carry a bearer/basic auth token → provision as a Worker SECRET,
# NOT a committed var:
#   bunx wrangler secret put OTEL_EXPORTER_OTLP_HEADERS --env production
#     value: "authorization=Basic <base64(instanceID:apiToken)>"

# ── PREVIEW environment ──────────────────────────────────────────────────────
# A complete, throwaway copy of the API for reviewing a feature branch on real
# infrastructure: `api-preview.cireweddings.com`, backed by its OWN D1
# (`cire-db-preview`) and the `-preview` R2 buckets. Deployed only by
# `.github/workflows/deploy-cire-preview.yml`, never by the main deploy.
#
# The separate database is the whole point. A branch's migrations run against
# THIS db, so a destructive migration (e.g. 0044 dropping the per-section theme
# colours) can be exercised end-to-end without touching a single row of prod.
# Preview data is disposable — the workflow seeds it and nobody should expect it
# to survive.
[env.preview.vars]
# Only the two preview origins may call this API. The organiser preview is a
# Pages project (*.pages.dev); the guest preview is a Worker on the zone.
WEB_ORIGIN = "https://invite-preview.cireweddings.com,https://cire-organiser-preview.pages.dev"
# Identity is shared with prod: the reviewer signs in with their real passkey,
# so no separate OSN tier is needed to exercise the organiser portal.
OSN_JWKS_URL = "https://id.cireweddings.com/.well-known/jwks.json"
OSN_ISSUER_URL = "https://id.cireweddings.com"
OSN_AUDIENCE = "osn-access"
GROWTHBOOK_API_HOST = "https://cdn.growthbook.io"
# ZAP_API_URL is deliberately NOT set. Named envs don't inherit top-level vars,
# so the code default (localhost) applies and vendor-enquiry delivery fails
# closed — a preview must never send a real email to a real vendor. Everything
# else in the enquiry flow still works; only the outbound send is inert.

[[env.preview.routes]]
pattern = "api-preview.cireweddings.com"
custom_domain = true

# Named environments do NOT inherit top-level bindings — each is redeclared.
# A DIFFERENT rate-limiter namespace so preview traffic can't consume prod's
# claim-attempt budget (or vice versa).
[[env.preview.unsafe.bindings]]
name = "CLAIM_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 5, period = 60 }

[[env.preview.d1_databases]]
binding = "DB"
database_name = "cire-db-preview"
database_id = "28d615d2-1e15-4592-9e44-cbf9c5af953a"
migrations_dir = "../db/migrations"

[[env.preview.r2_buckets]]
binding = "SHEETS"
bucket_name = "cire-sheets-preview"

[[env.preview.r2_buckets]]
binding = "ASSETS"
bucket_name = "cire-assets-preview"

[env.preview.images]
binding = "IMAGES"

[env.preview.observability]
enabled = true
head_sampling_rate = 1
