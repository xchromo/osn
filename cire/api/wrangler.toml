name = "cire-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Scheduled expired-session sweep (C-M2/C-M15). Daily 04:00 UTC — off-peak for
# the AU/EU guest audience, low contention with normal traffic. Sessions carry
# a 30-day TTL so once-a-day pruning bounds the dead-row backlog to <1 day.
[triggers]
crons = ["0 4 * * *"]

[vars]
WEB_ORIGIN = "http://localhost:4321"
OSN_JWKS_URL = "http://localhost:4000/.well-known/jwks.json"
OSN_ISSUER_URL = "http://localhost:4000"
OSN_AUDIENCE = "osn-access"

# Native Cloudflare Workers Rate Limiting binding for the pre-auth claim
# endpoint (C1/C4). Enforced globally + atomically at the edge — unlike the
# per-isolate in-memory limiter it replaces. `simple.limit`/`simple.period`
# mirror the in-memory default (5 attempts / 60s); `period` must be 10 or 60.
# `namespace_id` is an arbitrary stable integer scoping this limiter; bump it
# only to deliberately reset the counter namespace.
[[unsafe.bindings]]
name = "CLAIM_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[d1_databases]]
binding = "DB"
database_name = "cire-db"
database_id = "e0ebc94c-77df-47a6-af52-40a8c39b3afb"
migrations_dir = "../db/migrations"

# R2 bucket used by the organiser spreadsheet import flow to stash the raw
# uploaded sheet alongside its parsed `imports` row. Bucket must be created
# before first deploy:
#   bunx wrangler r2 bucket create cire-sheets
#   bunx wrangler r2 bucket create cire-sheets-preview
[[r2_buckets]]
binding = "SHEETS"
bucket_name = "cire-sheets"
preview_bucket_name = "cire-sheets-preview"

# R2 bucket for invite-builder images (hero / story photos). Separate from
# SHEETS: binary content, served publicly through the API, different retention.
# Bucket must be created before first deploy:
#   bunx wrangler r2 bucket create cire-assets
#   bunx wrangler r2 bucket create cire-assets-preview
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "cire-assets"
preview_bucket_name = "cire-assets-preview"

[env.production.vars]
# Comma-separated allowlist (index.ts splits on "," and trims). Entry 0 is the
# guest site; the organiser portal origin MUST also be present or organiser
# writes to /api/organiser/* fail the CORS origin guard with 403.
# TODO: replace <ORGANISER-ORIGIN-PLACEHOLDER> with the real organiser portal
# production origin (cire/organiser Cloudflare Pages deployment URL).
WEB_ORIGIN = "https://cire.pages.dev,https://<ORGANISER-ORIGIN-PLACEHOLDER>"
# REQUIRED BEFORE PROD — real OSN origin (placeholder host osn-api.example.com)
OSN_JWKS_URL = "https://osn-api.example.com/.well-known/jwks.json"
# REQUIRED BEFORE PROD — real OSN origin (placeholder host osn-api.example.com)
OSN_ISSUER_URL = "https://osn-api.example.com"
OSN_AUDIENCE = "osn-access"
# BOOTSTRAP_OWNER_PROFILE_ID — the organiser's real OSN profile id (usr_*).
# REQUIRED before the first deployed-D1 boot: migration 0006 seeds the bootstrap
# wedding with the inert sentinel owner; ensureBootstrapOwner (src/index.ts)
# repoints it to this value on first isolate boot, or fails loud (503) if unset.
# Set it (with OSN_ENV) as a secret, NOT a plaintext var:
#   bunx wrangler secret put BOOTSTRAP_OWNER_PROFILE_ID
#   bunx wrangler secret put OSN_ENV   # must be dev|staging|production

# Wrangler named environments do NOT inherit top-level [[d1_databases]] /
# [[r2_buckets]] / [[unsafe.bindings]] — they must be redeclared per-env.
# Without these, `wrangler deploy --env production` ships with no DB/R2 (worker
# fail-closes 503 at index.ts) and no CLAIM_RATE_LIMITER (the claim endpoint
# loses its edge rate limit). Keep these in sync with the top-level bindings.
[[env.production.unsafe.bindings]]
name = "CLAIM_RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[[env.production.d1_databases]]
binding = "DB"
database_name = "cire-db"
database_id = "e0ebc94c-77df-47a6-af52-40a8c39b3afb"
migrations_dir = "../db/migrations"

[[env.production.r2_buckets]]
binding = "SHEETS"
bucket_name = "cire-sheets"
preview_bucket_name = "cire-sheets-preview"

[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "cire-assets"
preview_bucket_name = "cire-assets-preview"

# ── OpenTelemetry export ─────────────────────────────────────────────────────
# Read by `@shared/observability` `loadConfig` (workerd `nodejs_compat`
# populates `process.env` from these [vars] + secrets). With the endpoint UNSET,
# tracing + metrics are a true no-op (zero export attempts) — so leaving this
# commented out keeps local/dev safe. Set the base OTLP/HTTP endpoint to turn
# export on; `@shared/observability` appends `/v1/traces` + `/v1/metrics` itself.
#
#   OTEL_SERVICE_NAME            non-secret, can live in [vars] (defaults to "cire-api")
#   OTEL_EXPORTER_OTLP_ENDPOINT  non-secret base URL, e.g. Grafana Cloud OTLP gateway
#   OTEL_EXPORTER_OTLP_HEADERS   SECRET — carries the auth token, never commit it
#
# Non-secret placeholders (uncomment + set the real endpoint before deploy):
#   OTEL_SERVICE_NAME = "cire-api"
#   OTEL_EXPORTER_OTLP_ENDPOINT = "https://otlp-gateway-<region>.grafana.net/otlp"
#
# The headers carry a bearer/basic auth token → provision as a Worker SECRET,
# NOT a committed var:
#   bunx wrangler secret put OTEL_EXPORTER_OTLP_HEADERS --env production
#     value: "authorization=Basic <base64(instanceID:apiToken)>"
