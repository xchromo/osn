# ── production ───────────────────────────────────────────────────────────────
# OSN identity runs under the cireweddings.com zone for now (a dedicated OSN
# domain is deferred). The custom-domain route below serves osn-api on
# id.cireweddings.com and auto-provisions DNS + edge cert since the zone is
# in-account. Prod passkey surfaces: the organiser portal, the vendor portal,
# and the guest site's optional "Link my Pulse account" island (guests still
# claim with codes; the passkey ceremony there is additive). The WebAuthn RP ID
# is the registrable apex `cireweddings.com`, so one credential works across
# all three subdomains.
#
# Domain reshuffle 2026-07-16: the organiser portal moved app.cireweddings.com →
# host.cireweddings.com. RP ID stays the registrable apex `cireweddings.com`, so
# existing organiser passkeys keep working on the new subdomain (credentials are
# scoped to the RP ID, not the full origin) — NO re-registration. The transitional
# `app.cireweddings.com` allowlist entries were pruned after the cutover; only
# `host.` remains.
[env.production.vars]
OSN_ENV = "production"
OSN_RP_ID = "cireweddings.com"
OSN_RP_NAME = "OSN"
OSN_ORIGIN = "https://host.cireweddings.com,https://vendor.cireweddings.com,https://invite.cireweddings.com"
OSN_ISSUER_URL = "https://id.cireweddings.com"
OSN_CORS_ORIGIN = "https://host.cireweddings.com,https://vendor.cireweddings.com,https://invite.cireweddings.com"
OSN_EMAIL_FROM = "hello@cireweddings.com"
# Email is sent via Resend (RESEND_API_KEY secret, §1.1) — confirmed delivering
# from hello@cireweddings.com on 2026-06-18. Email is REQUIRED in prod: if
# RESEND_API_KEY is ever absent osn-api fails closed at startup rather than
# silently dropping OTP/security mail. (The former OSN_EMAIL_OPTIONAL degraded
# opt-in was removed once Resend delivery was verified.)

# Custom-domain route: serves osn-api on id.cireweddings.com. `custom_domain =
# true` auto-provisions DNS + edge cert because the cireweddings.com zone is in
# this Cloudflare account. Named envs do NOT inherit top-level routes, so this
# applies only to `wrangler deploy --env production`.
[[env.production.routes]]
pattern = "id.cireweddings.com"
custom_domain = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "osn-db-prod"
database_id = "767a9ac1-129b-4efa-9fcf-f68ed7a48c38"
migrations_dir = "../db/drizzle"

# Native rate-limit bindings mirrored into production (named envs don't inherit).
# osn-api MUST be redeployed (`wrangler deploy --env production`) for these to
# take effect; the namespace_ids are new.
[[env.production.ratelimits]]
name = "RL_AUTH_IP_5_60"
namespace_id = "2001"
simple = { limit = 5, period = 60 }

[[env.production.ratelimits]]
name = "RL_AUTH_IP_10_60"
namespace_id = "2002"
simple = { limit = 10, period = 60 }

[[env.production.ratelimits]]
name = "RL_AUTH_IP_20_60"
namespace_id = "2003"
simple = { limit = 20, period = 60 }

[[env.production.ratelimits]]
name = "RL_AUTH_IP_30_60"
namespace_id = "2004"
simple = { limit = 30, period = 60 }

[[env.production.ratelimits]]
name = "RL_AUTH_IP_60_60"
namespace_id = "2005"
simple = { limit = 60, period = 60 }

[env.production.observability]
enabled = true
head_sampling_rate = 1

[env.production.triggers]
crons = ["0 */6 * * *"]

# ── Secrets (NOT in this file) ───────────────────────────────────────────────
# Provision per env with `wrangler secret put <NAME> --env <dev|staging|production>`.
# On workerd these are surfaced ONLY on the `env` binding (never process.env),
# which is why `src/index.ts` threads `env` through `buildAppDeps`.
#
#   OSN_JWT_PRIVATE_KEY        base64 JWK (ES256 private)  — REQUIRED non-local
#   OSN_JWT_PUBLIC_KEY         base64 JWK (ES256 public)   — REQUIRED non-local
#   OSN_SESSION_IP_PEPPER      ≥32-byte HMAC key           — REQUIRED non-local
#   UPSTASH_REDIS_REST_URL     Upstash REST URL            — REQUIRED non-local (S-L1; region TBD C-M18)
#   UPSTASH_REDIS_REST_TOKEN   Upstash REST token          — REQUIRED non-local (S-L1; region TBD C-M18)
#   RESEND_API_KEY             Resend bearer key — REQUIRED non-local (preferred
#                              email transport; selected over CLOUDFLARE_* creds)
#   CLOUDFLARE_ACCOUNT_ID      legacy Cloudflare Email Service — optional fallback
#   CLOUDFLARE_EMAIL_API_TOKEN legacy Cloudflare Email Service — optional fallback
#   OSN_EMAIL_FROM             verified sender (also settable as a [vars])
#   INTERNAL_SERVICE_SECRET    S2S registration shared secret (optional)
#   PULSE_API_URL / ZAP_API_URL deletion fan-out targets (optional; also [vars])
#   TRUSTED_PROXY_COUNT        legacy XFF proxy-hop count. IGNORED in deployed
#                              tiers: the Workers entry sets trustCloudflare for
#                              non-local, so per-IP keying uses cf-connecting-ip
#                              exclusively (Part 1). Only consulted by the Bun
#                              dev server's XFF/socket path.
#   OTEL_EXPORTER_OTLP_HEADERS Grafana Cloud auth (optional, deferred export)

# ── OpenTelemetry export (deferred on workerd) ───────────────────────────────
# OTEL_SERVICE_NAME / OTEL_EXPORTER_OTLP_ENDPOINT are non-secret [vars]; the
# headers token is a secret. Metric/trace EXPORT on workerd is deferred — the
# redacting logger (osnLoggerLayer) is active, recording call-sites are no-ops
# until an exporter is attached.
