name = "osn-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# osn-api now runs on Cloudflare Workers via `export default { fetch, scheduled }`
# in `src/index.ts` (Phase 6). The Bun dev server (`src/local.ts`) is unchanged
# and remains the default fast devloop (`bun run dev`); `wrangler dev` is the
# workerd parity loop (`bun run dev:wrangler`).
#
# Migrate the D1 databases for free, locally and remotely:
#   bun run --cwd osn/db db:migrate:local     # miniflare local D1
#   bun run --cwd osn/db db:migrate:dev       # remote dev D1
#
# Tracked in wiki/TODO.md (Four-environment DB story).

# ── Top-level (local `wrangler dev`) ─────────────────────────────────────────
# These apply to `wrangler dev` with no `--env`. OSN_ENV is unset/"local" here,
# so: in-memory rate limiters (no Upstash needed), miniflare local D1, no Secure
# cookies, localhost issuer/CORS/RP defaults baked into the factory. Needs NO
# external services.
[vars]
OSN_ENV = "local"
OSN_RP_ID = "localhost"
OSN_RP_NAME = "OSN"
OSN_ORIGIN = "http://localhost:1422,http://localhost:1420,http://localhost:4322,http://localhost:5173"
OSN_ISSUER_URL = "http://localhost:8787"
OSN_CORS_ORIGIN = "http://localhost:1422,http://localhost:1420,http://localhost:4322"

# Local `wrangler dev` D1 (miniflare). database_id is ignored locally but
# required syntactically; reuse the dev id so `--local` and `--remote dev` share
# one migrations_dir.
[[d1_databases]]
binding = "DB"
database_name = "osn-db"
database_id = "a1dfceb8-2e7a-48eb-a161-ad428f3ddff5"
migrations_dir = "../db/drizzle"

# ── Scheduled maintenance (cron) ─────────────────────────────────────────────
# Replaces the Bun `setInterval` deletion sweeper. Cadence matches the Bun
# SWEEPER_INTERVAL default (6 h) — runs the account-erasure fan-out-retry +
# hard-delete sweeps. ARC outbound-key rotation is NOT cron'd: it lazily inits
# on first outbound use (see `lib/outbound-arc.ts`).
[triggers]
crons = ["0 */6 * * *"]

# ── dev ──────────────────────────────────────────────────────────────────────
[env.dev.vars]
OSN_ENV = "dev"
# TODO(prod-domains): replace with the real dev frontend origin once a
# workers.dev / dev domain is provisioned. Until then point at the dev SPA host.
OSN_RP_ID = "localhost"
OSN_RP_NAME = "OSN (dev)"
OSN_ORIGIN = "http://localhost:1422"
OSN_ISSUER_URL = "http://localhost:8787"
OSN_CORS_ORIGIN = "http://localhost:1422"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "osn-db"
database_id = "a1dfceb8-2e7a-48eb-a161-ad428f3ddff5"
migrations_dir = "../db/drizzle"

[env.dev.triggers]
crons = ["0 */6 * * *"]

# ── staging ──────────────────────────────────────────────────────────────────
[env.staging.vars]
OSN_ENV = "staging"
# TODO(prod-domains): PLACEHOLDERS. Default deploy URL is
# https://osn-api.<account-subdomain>.workers.dev — set OSN_ISSUER_URL to that at
# deploy. OSN_RP_ID/OSN_ORIGIN need a real custom domain (workers.dev can't be a
# WebAuthn RP ID across surfaces), so staging passkeys are deferred until then.
OSN_RP_ID = "staging.osn.example"
OSN_RP_NAME = "OSN (staging)"
OSN_ORIGIN = "https://staging.osn.example"
OSN_ISSUER_URL = "https://api.staging.osn.example"
OSN_CORS_ORIGIN = "https://staging.osn.example"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "osn-db-staging"
database_id = "eb71428e-8540-4a30-815f-fb9cd4ae97ea"
migrations_dir = "../db/drizzle"

[env.staging.triggers]
crons = ["0 */6 * * *"]

# ── production ───────────────────────────────────────────────────────────────
[env.production.vars]
OSN_ENV = "production"
# TODO(prod-domains): PLACEHOLDERS. Default deploy URL is
# https://osn-api.<account-subdomain>.workers.dev — set OSN_ISSUER_URL to that at
# deploy. OSN_RP_ID/OSN_ORIGIN need a real custom domain (workers.dev can't be a
# WebAuthn RP ID across surfaces), so prod passkeys are DEFERRED per project decision
# until a custom domain is provisioned. See wiki/runbooks/production-deploy.md §5.1.
OSN_RP_ID = "osn.example"
OSN_RP_NAME = "OSN"
OSN_ORIGIN = "https://osn.example"
OSN_ISSUER_URL = "https://api.osn.example"
OSN_CORS_ORIGIN = "https://osn.example"

[[env.production.d1_databases]]
binding = "DB"
database_name = "osn-db-prod"
database_id = "767a9ac1-129b-4efa-9fcf-f68ed7a48c38"
migrations_dir = "../db/drizzle"

[env.production.triggers]
crons = ["0 */6 * * *"]

# ── Secrets (NOT in this file) ───────────────────────────────────────────────
# Provision per env with `wrangler secret put <NAME> --env <dev|staging|production>`.
# On workerd these are surfaced ONLY on the `env` binding (never process.env),
# which is why `src/index.ts` threads `env` through `buildAppDeps`.
#
#   OSN_JWT_PRIVATE_KEY        base64 JWK (ES256 private)  — REQUIRED non-local
#   OSN_JWT_PUBLIC_KEY         base64 JWK (ES256 public)   — REQUIRED non-local
#   OSN_SESSION_IP_PEPPER      ≥32-byte HMAC key           — REQUIRED non-local
#   UPSTASH_REDIS_REST_URL     Upstash REST URL            — REQUIRED non-local (S-L1; region TBD C-M18)
#   UPSTASH_REDIS_REST_TOKEN   Upstash REST token          — REQUIRED non-local (S-L1; region TBD C-M18)
#   CLOUDFLARE_ACCOUNT_ID      for the Email Service REST API — REQUIRED non-local
#   CLOUDFLARE_EMAIL_API_TOKEN bearer token for email send  — REQUIRED non-local
#   OSN_EMAIL_FROM             verified sender (also settable as a [vars])
#   INTERNAL_SERVICE_SECRET    S2S registration shared secret (optional)
#   PULSE_API_URL / ZAP_API_URL deletion fan-out targets (optional; also [vars])
#   TRUSTED_PROXY_COUNT        proxy hops for XFF keying (optional; CF sets cf-connecting-ip)
#   OTEL_EXPORTER_OTLP_HEADERS Grafana Cloud auth (optional, deferred export)

# ── OpenTelemetry export (deferred on workerd) ───────────────────────────────
# OTEL_SERVICE_NAME / OTEL_EXPORTER_OTLP_ENDPOINT are non-secret [vars]; the
# headers token is a secret. Metric/trace EXPORT on workerd is deferred — the
# redacting logger (osnLoggerLayer) is active, recording call-sites are no-ops
# until an exporter is attached.
