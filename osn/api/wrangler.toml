name = "osn-api"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Refuse to publish the top-level (env-less) config to a *.workers.dev URL. The
# top-level block is the local `wrangler dev` posture (OSN_ENV=local: ephemeral
# JWT keys, in-memory rate limiters, non-Secure cookies), so a bare
# `wrangler deploy` would expose a public identity API in dev posture. With no
# top-level routes a bare deploy now fails loudly. Real deploys use
# `--env production` (custom_domain route below).
workers_dev = false

# osn-api now runs on Cloudflare Workers via `export default { fetch, scheduled }`
# in `src/index.ts` (Phase 6). The Bun dev server (`src/local.ts`) is unchanged
# and remains the default fast devloop (`bun run dev`); `wrangler dev` is the
# workerd parity loop (`bun run dev:wrangler`).
#
# Migrate the D1 databases for free, locally and remotely:
#   bun run --cwd osn/db db:migrate:local     # miniflare local D1
#   bun run --cwd osn/db db:migrate:dev       # remote dev D1
#
# Tracked in wiki/TODO.md (Four-environment DB story).

# ── Top-level (local `wrangler dev`) ─────────────────────────────────────────
# These apply to `wrangler dev` with no `--env`. OSN_ENV is unset/"local" here,
# so: in-memory rate limiters (no Upstash needed), miniflare local D1, no Secure
# cookies, localhost issuer/CORS/RP defaults baked into the factory. Needs NO
# external services.
[vars]
OSN_ENV = "local"
OSN_RP_ID = "localhost"
OSN_RP_NAME = "OSN"
OSN_ORIGIN = "http://localhost:1422,http://localhost:1420,http://localhost:4322,http://localhost:5173,http://localhost:4326,http://localhost:4321"
OSN_ISSUER_URL = "http://localhost:8787"
OSN_CORS_ORIGIN = "http://localhost:1422,http://localhost:1420,http://localhost:4322,http://localhost:4326,http://localhost:4321"

# Local `wrangler dev` D1 (miniflare). database_id is ignored locally but
# required syntactically; reuse the dev id so `--local` and `--remote dev` share
# one migrations_dir.
[[d1_databases]]
binding = "DB"
database_name = "osn-db"
database_id = "a1dfceb8-2e7a-48eb-a161-ad428f3ddff5"
migrations_dir = "../db/drizzle"

# ── Native Workers Rate Limiting bindings (GA `[[ratelimits]]`) ───────────────
# Part 2: the 60s-window per-IP auth limiters run on Cloudflare's native Rate
# Limiting binding (global + atomic at the edge) instead of Upstash. One binding
# per request-budget tier (5/10/20/30/60 per 60s) so every endpoint keeps its
# existing budget; `selectAuthRateLimiters` (src/lib/native-rate-limiters.ts)
# namespaces the key per endpoint so endpoints sharing a tier never share a
# bucket. The native binding only supports period 10 or 60s, so the three
# 1-hour-window per-IP limiters (recovery generate/complete, email-change-begin)
# and every per-user/per-account limiter + stateful store STAY on Upstash.
#
# TRADE-OFF: native rate limiting is counted PER-COLO, not globally — a caller
# spread across Cloudflare locations sees a slightly looser effective cap. This
# was explicitly approved; a single attacker is pinned to one colo, and the
# stateful brute-force guards (recovery lockout) remain on Upstash.
#
# `namespace_id` is an account-scoped positive integer that uniquely identifies
# the namespace. The values below are NEW and per-tier; bump/replace them if they
# collide with another Worker's namespaces in this account. Named envs do NOT
# inherit these — they are mirrored into [env.dev|staging|production] below.
[[ratelimits]]
name = "RL_AUTH_IP_5_60"
namespace_id = "2001"
simple = { limit = 5, period = 60 }

[[ratelimits]]
name = "RL_AUTH_IP_10_60"
namespace_id = "2002"
simple = { limit = 10, period = 60 }

[[ratelimits]]
name = "RL_AUTH_IP_20_60"
namespace_id = "2003"
simple = { limit = 20, period = 60 }

[[ratelimits]]
name = "RL_AUTH_IP_30_60"
namespace_id = "2004"
simple = { limit = 30, period = 60 }

[[ratelimits]]
name = "RL_AUTH_IP_60_60"
namespace_id = "2005"
simple = { limit = 60, period = 60 }

# ── Workers observability (Part 3) ───────────────────────────────────────────
# Free Workers Logs + invocation capture in the Cloudflare dashboard. This is the
# interim observability while OTel export stays deferred on workerd (the
# redacting osnLoggerLayer keeps structured logs; no logger/observability code
# changes). head_sampling_rate = 1 captures every invocation at launch volume.
# Named envs do NOT inherit this — mirrored into each [env.*] below.
[observability]
enabled = true
head_sampling_rate = 1

# ── Scheduled maintenance (cron) ─────────────────────────────────────────────
# Replaces the Bun `setInterval` deletion sweeper. Cadence matches the Bun
# SWEEPER_INTERVAL default (6 h) — runs the account-erasure fan-out-retry +
# hard-delete sweeps. ARC outbound-key rotation is NOT cron'd: it lazily inits
# on first outbound use (see `lib/outbound-arc.ts`).
[triggers]
crons = ["0 */6 * * *"]

