name = "osn-email-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# ----------------------------------------------------------------------------
# Environment
#
# Required secrets (set via `wrangler secret put <KEY>`):
#   - RESEND_API_KEY      : Resend API key. Swapped to another provider's
#                           binding if we change provider; the code switch
#                           lives in src/providers/.
#
# Required vars (set in [vars] or via `wrangler deploy --var ...`):
#   - OSN_API_ISSUER_JWKS : URL of OSN's JWKS endpoint (e.g.
#                           https://api.osn.app/.well-known/jwks.json).
#   - OSN_API_ISSUER_ID   : Expected issuer claim on inbound ARC tokens.
#                           Defaults to "osn-api".
#   - FROM_ADDRESS_DEFAULT: Fallback `From:` address if the request omits
#                           one. Must be an address verified with the
#                           provider; a misconfig should be surfaced loudly
#                           by the provider's own error path.
# ----------------------------------------------------------------------------

[vars]
OSN_API_ISSUER_JWKS = "https://api.osn.local/.well-known/jwks.json"
OSN_API_ISSUER_ID = "osn-api"
FROM_ADDRESS_DEFAULT = "noreply@osn.local"
