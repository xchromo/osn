name: Changeset Check

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Require changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changeset
        run: |
          files=$(git diff --name-only origin/main...HEAD | grep '^\.changeset/.*\.md$' | grep -v README.md || true)
          if [ -z "$files" ]; then
            echo "❌ No changeset found. Run 'bun run changeset' to add one."
            exit 1
          fi
          echo "✅ Changeset found:"
          echo "$files"

      # Validate that every package name referenced in any .changeset/*.md
      # frontmatter matches a real workspace `name` field. The validator is a
      # self-contained shell+jq script (no bun, no @changesets/cli, no network)
      # so it runs identically here and locally — see scripts/validate-changesets.sh
      # for the rationale and the bug class it guards against.
      # Self-test the validator's logic against fixture changesets before trusting
      # it on the real tree, so a regression in the parser fails loudly here
      # rather than silently letting a bad package name through.
      - name: Test changeset validator
        run: bash scripts/validate-changesets.test.sh

      - name: Validate changeset package names
        run: bash scripts/validate-changesets.sh
