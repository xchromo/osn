name: Deploy

# Production deploy pipeline.
#
# Triggers:
#   - push to `main` (after a merge)
#   - manual `workflow_dispatch`
#
# The actual deploy jobs are gated on a `build` job that re-runs the same
# install + build + test the CI workflow does, so we never ship a broken tree.
# Cloudflare credentials come from the `production` GitHub Environment secrets;
# secret VALUES are never embedded here.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; let an in-flight deploy finish
# before starting the next (do not cancel — a half-applied deploy is worse).
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────
  # Re-run install + build + test before any deploy. If this fails, every
  # deploy job below is skipped (they `needs: build`).
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  # ── cire API + D1 migrations ───────────────────────────────────────────────
  # Migrations are applied to the REMOTE prod DB FIRST, then the Worker is
  # deployed — both in a single job so the order is guaranteed and the
  # migration runs exactly once. The cire-db D1 binding lives at the top level
  # of cire/api/wrangler.toml (uuid 6e835474-e0a7-4db9-8883-3247c3c891cd), so we
  # apply migrations against that config; the `--env production` overlay only
  # changes vars (WEB_ORIGIN / OSN issuer), not the DB.
  deploy-cire-api:
    name: Deploy cire/api (+ D1 migrate)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # Fail the deploy if cire/api/wrangler.toml still carries the placeholder
      # (or empty) D1 database_id — deploying against a non-existent DB would
      # silently break every D1 read/write in prod. Wired correctly today; this
      # is a regression guard (grep-only, no creds needed).
      - name: Guard against placeholder D1 database_id
        run: bash scripts/check-d1-database-id.sh

      # Apply pending migrations to the remote prod cire-db BEFORE the new
      # Worker code starts serving. Idempotent: wrangler skips already-applied
      # migrations, so re-running the workflow is safe.
      - name: Apply cire D1 migrations (remote prod)
        run: bunx wrangler d1 migrations apply cire-db --remote
        working-directory: cire/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy cire/api Worker
        run: bunx wrangler deploy --env production
        working-directory: cire/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── cire web (Astro → Cloudflare Pages) ────────────────────────────────────
  # Independent of the API job; runs in parallel once `build` passes.
  deploy-cire-web:
    name: Deploy cire/web (Worker SSR)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # The guest site is now Astro SSR on Cloudflare (output: "server", the
      # @astrojs/cloudflare adapter). It resolves which wedding to render FROM THE
      # PATH per request — there is NO PUBLIC_WEDDING_SLUG any more. The adapter
      # emits a Cloudflare Worker with Static Assets: `dist/server/entry.mjs` (the
      # SSR Worker), `dist/client/` (prerendered legal pages + JS/CSS), and a
      # generated `dist/server/wrangler.json` that EXTENDS the committed
      # cire/web/wrangler.jsonc (worker name + invite.cireweddings.com
      # custom-domain route). PUBLIC_API_URL / PUBLIC_SITE_URL are read both server-side (per
      # request) and by the client islands; they still bake in at build time.
      #   PUBLIC_GOOGLE_MAPS_EMBED_KEY is an optional referrer-restricted Embed
      #   key — wire it from a secret/var only if/when one exists.
      #   PUBLIC_TURNSTILE_SITEKEY is the optional Cloudflare Turnstile sitekey
      #   (public, bot protection). The build omits it cleanly when absent (no
      #   widget, no gate — key-optional). The matching TURNSTILE_SECRET_KEY is a
      #   `wrangler secret` on the cire-api Worker (see production-deploy.md).
      - name: Build cire/web
        run: bun run --cwd cire/web build
        env:
          PUBLIC_API_URL: https://api.cireweddings.com
          # Domain reshuffle 2026-07-16: the guest site now lives on the `invite.`
          # subdomain (apex serves the marketing landing site).
          PUBLIC_SITE_URL: https://invite.cireweddings.com
          PUBLIC_TURNSTILE_SITEKEY: ${{ vars.PUBLIC_TURNSTILE_SITEKEY }}
          # Google Maps Embed API key (public, referrer-restricted to *.cireweddings.com).
          # Present ⇒ real Embed iframe; absent ⇒ CSS-card fallback (key-optional).
          PUBLIC_GOOGLE_MAPS_EMBED_KEY: ${{ vars.PUBLIC_GOOGLE_MAPS_EMBED_KEY }}

      # `@astrojs/cloudflare` writes a top-level `"legacy_env": true` into the
      # generated `dist/server/wrangler.json`. Wrangler 4.111+ REMOVED support for
      # that field and hard-errors on it ("legacy_env field is no longer
      # supported") — and because cire/web pins no wrangler, `bunx wrangler` below
      # fetches the latest, so this broke the guest-site deploy the moment 4.111
      # shipped (cire-api is unaffected: hand-written wrangler.toml, no legacy_env,
      # wrangler pinned ^4.96). Removing the field is a no-op for behaviour —
      # `legacy_env: true` WAS the default (each env deploys as its own Worker),
      # so stripping it deploys identically. Version-proof: harmless if a future
      # adapter stops emitting it.
      - name: Strip unsupported legacy_env from generated config
        run: node -e "const fs=require('fs'),f='dist/server/wrangler.json',c=JSON.parse(fs.readFileSync(f,'utf8'));delete c.legacy_env;fs.writeFileSync(f,JSON.stringify(c))"
        working-directory: cire/web

      # Deploy the SSR Worker. The adapter's generated config carries `main`, the
      # ASSETS binding (→ dist/client), the worker name, and the
      # invite.cireweddings.com custom-domain route. NOTE: this replaces the
      # previous Pages deploy (`wrangler pages deploy dist`); the Cloudflare Pages
      # project `cire` is no longer used for the guest site — invite. resolves to
      # this Worker (the apex now serves the cire-landing marketing site).
      - name: Deploy cire/web (Worker)
        run: bunx wrangler deploy --config dist/server/wrangler.json
        working-directory: cire/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── cire organiser (Astro → Cloudflare Pages) ──────────────────────────────
  # The organiser portal is a separate static Astro build + Pages project from
  # the guest site. Its PUBLIC_* vars (cire-api origin, OSN issuer for passkey
  # sign-in, guest-site URL for the preview link) bake in at build time. The
  # `cire-organiser` Pages project must exist in the account before first run
  # (create once in the dashboard or `wrangler pages project create`).
  deploy-cire-organiser:
    name: Deploy cire/organiser (Pages)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build cire/organiser
        run: bun run --cwd cire/organiser build
        env:
          PUBLIC_CIRE_API_URL: https://api.cireweddings.com
          PUBLIC_OSN_ISSUER_URL: https://id.cireweddings.com
          # Domain reshuffle 2026-07-16: the guest site (this is the organiser's
          # "preview / view live invite" link) now lives on `invite.`.
          PUBLIC_CIRE_WEB_URL: https://invite.cireweddings.com
          # Optional Cloudflare Turnstile sitekey (public) for organiser passkey
          # sign-in. Uncomment once the widget exists; omitted ⇒ key-optional
          # no-op. Matching TURNSTILE_SECRET_KEY is a wrangler secret on osn-api.
          PUBLIC_TURNSTILE_SITEKEY: ${{ vars.PUBLIC_TURNSTILE_SITEKEY }}

      - name: Deploy cire/organiser to Cloudflare Pages
        run: bunx wrangler pages deploy dist --project-name cire-organiser
        working-directory: cire/organiser
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── cire landing (Astro → Cloudflare Pages, APEX cireweddings.com) ─────────
  # The marketing site for the apex. Built fully static (output: "static", no
  # Cloudflare adapter) and deployed to its OWN Pages project, separate from the
  # guest site + organiser portal. Domain reshuffle 2026-07-16: this now serves
  # the APEX `cireweddings.com` (guest invites moved to `invite.`, organiser to
  # `host.`). The apex custom domain is attached to the `cire-landing` Pages
  # project in the Cloudflare dashboard (a Pages custom domain, not a wrangler
  # config route) — see wiki/apps/cire-landing.md cutover steps. The
  # `cire-landing` Pages project must exist in the account before first run.
  deploy-cire-landing:
    name: Deploy cire/landing (Pages, apex)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # Build-time PUBLIC_* vars (all baked in by Vite):
      #   PUBLIC_ORGANISER_URL — target of the primary "Create your invitation"
      #     CTA. Points at the organiser portal, now host.cireweddings.com
      #     (domain reshuffle 2026-07-16, moved off app.cireweddings.com).
      #   SITE — canonical origin for SEO meta; the apex cireweddings.com.
      - name: Build cire/landing
        run: bun run --cwd cire/landing build
        env:
          PUBLIC_ORGANISER_URL: https://host.cireweddings.com
          SITE: https://cireweddings.com

      - name: Deploy cire/landing to Cloudflare Pages
        run: bunx wrangler pages deploy dist --project-name cire-landing
        working-directory: cire/landing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── osn/api ────────────────────────────────────────────────────────────────
  # NOTE: osn/api is NOT deployed by CI yet. Its Worker entry exists
  # (`main = "src/index.ts"`, Phase 6) and its prod config is wired — the
  # `[env.production]` custom-domain route serves it at id.cireweddings.com — but
  # the CI deploy job stays gated until the ioredis rate-limiters/session stores
  # are swapped for a Workers-compatible Redis (see osn/api/wrangler.toml and
  # wiki/TODO.md). Until then deploy osn-api manually per the runbook §5.1. When
  # the Redis swap lands, add a `deploy-osn-api` job here mirroring
  # deploy-cire-api:
  #
  #   deploy-osn-api:
  #     name: Deploy osn/api
  #     needs: build
  #     runs-on: ubuntu-latest
  #     environment: production
  #     steps:
  #       - ... checkout / setup-bun / install ...
  #       - run: bunx wrangler deploy --env production
  #         working-directory: osn/api
  #         env:
  #           CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  #           CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
