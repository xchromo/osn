name: Deploy

# Production deploy pipeline.
#
# Triggers:
#   - push to `main` (after a merge)
#   - manual `workflow_dispatch`
#
# The actual deploy jobs are gated on a `build` job that re-runs the same
# install + build + test the CI workflow does, so we never ship a broken tree.
# Cloudflare credentials come from the `production` GitHub Environment secrets;
# secret VALUES are never embedded here.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; let an in-flight deploy finish
# before starting the next (do not cancel — a half-applied deploy is worse).
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate ─────────────────────────────────────────────────────────────────
  # Re-run install + build + test before any deploy. If this fails, every
  # deploy job below is skipped (they `needs: build`).
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  # ── cire API + D1 migrations ───────────────────────────────────────────────
  # Migrations are applied to the REMOTE prod DB FIRST, then the Worker is
  # deployed — both in a single job so the order is guaranteed and the
  # migration runs exactly once. The cire-db D1 binding lives at the top level
  # of cire/api/wrangler.toml (uuid 6e835474-e0a7-4db9-8883-3247c3c891cd), so we
  # apply migrations against that config; the `--env production` overlay only
  # changes vars (WEB_ORIGIN / OSN issuer), not the DB.
  deploy-cire-api:
    name: Deploy cire/api (+ D1 migrate)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # Apply pending migrations to the remote prod cire-db BEFORE the new
      # Worker code starts serving. Idempotent: wrangler skips already-applied
      # migrations, so re-running the workflow is safe.
      - name: Apply cire D1 migrations (remote prod)
        run: bunx wrangler d1 migrations apply cire-db --remote
        working-directory: cire/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy cire/api Worker
        run: bunx wrangler deploy --env production
        working-directory: cire/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── cire web (Astro → Cloudflare Pages) ────────────────────────────────────
  # Independent of the API job; runs in parallel once `build` passes.
  deploy-cire-web:
    name: Deploy cire/web (Pages)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # Build the static Astro site (output: "static" → ./dist). The PUBLIC_*
      # vars are baked in AT BUILD TIME (static Astro), so they are set here in
      # the build env, not at runtime. These are non-secret prod URLs.
      #   PUBLIC_GOOGLE_MAPS_EMBED_KEY is an optional referrer-restricted Embed
      #   key — wire it from a secret/var only if/when one exists.
      #   PUBLIC_TURNSTILE_SITEKEY is the optional Cloudflare Turnstile sitekey
      #   (public, bot protection). Uncomment once the widget exists; the build
      #   omits it cleanly when absent (no widget, no gate — key-optional). The
      #   matching TURNSTILE_SECRET_KEY is a `wrangler secret` on the cire-api
      #   Worker (see wiki/runbooks/production-deploy.md).
      - name: Build cire/web
        run: bun run --cwd cire/web build
        env:
          PUBLIC_API_URL: https://api.cireweddings.com
          PUBLIC_SITE_URL: https://cireweddings.com
          # PUBLIC_TURNSTILE_SITEKEY: ${{ vars.PUBLIC_TURNSTILE_SITEKEY }}

      - name: Deploy cire/web to Cloudflare Pages
        run: bunx wrangler pages deploy dist --project-name cire
        working-directory: cire/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── cire organiser (Astro → Cloudflare Pages) ──────────────────────────────
  # The organiser portal is a separate static Astro build + Pages project from
  # the guest site. Its PUBLIC_* vars (cire-api origin, OSN issuer for passkey
  # sign-in, guest-site URL for the preview link) bake in at build time. The
  # `cire-organiser` Pages project must exist in the account before first run
  # (create once in the dashboard or `wrangler pages project create`).
  deploy-cire-organiser:
    name: Deploy cire/organiser (Pages)
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build cire/organiser
        run: bun run --cwd cire/organiser build
        env:
          PUBLIC_CIRE_API_URL: https://api.cireweddings.com
          PUBLIC_OSN_ISSUER_URL: https://id.cireweddings.com
          PUBLIC_CIRE_WEB_URL: https://cireweddings.com
          # Optional Cloudflare Turnstile sitekey (public) for organiser passkey
          # sign-in. Uncomment once the widget exists; omitted ⇒ key-optional
          # no-op. Matching TURNSTILE_SECRET_KEY is a wrangler secret on osn-api.
          # PUBLIC_TURNSTILE_SITEKEY: ${{ vars.PUBLIC_TURNSTILE_SITEKEY }}

      - name: Deploy cire/organiser to Cloudflare Pages
        run: bunx wrangler pages deploy dist --project-name cire-organiser
        working-directory: cire/organiser
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── osn/api ────────────────────────────────────────────────────────────────
  # NOTE: osn/api is NOT deployed by CI yet. Its Worker entry exists
  # (`main = "src/index.ts"`, Phase 6) and its prod config is wired — the
  # `[env.production]` custom-domain route serves it at id.cireweddings.com — but
  # the CI deploy job stays gated until the ioredis rate-limiters/session stores
  # are swapped for a Workers-compatible Redis (see osn/api/wrangler.toml and
  # wiki/TODO.md). Until then deploy osn-api manually per the runbook §5.1. When
  # the Redis swap lands, add a `deploy-osn-api` job here mirroring
  # deploy-cire-api:
  #
  #   deploy-osn-api:
  #     name: Deploy osn/api
  #     needs: build
  #     runs-on: ubuntu-latest
  #     environment: production
  #     steps:
  #       - ... checkout / setup-bun / install ...
  #       - run: bunx wrangler deploy --env production
  #         working-directory: osn/api
  #         env:
  #           CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  #           CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
