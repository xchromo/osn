# One-shot operator workflow: set the OSN_PAIRWISE_SALT Worker secret on the
# production osn-api deployment.
#
# WHY THIS EXISTS. The OIDC provider derives every pairwise `sub` from this
# salt (HMAC over sector | profile id). The boot check is FAIL-CLOSED: without
# the secret, osn-api refuses to serve outside local — so a deploy that lands
# before the salt is set leaves id.cireweddings.com down until it exists. And
# the salt must NEVER change once tokens are live: rotation makes every
# relying party see its users as strangers, permanently.
#
# Accordingly this workflow:
#   - is manual only (workflow_dispatch) and runs under the `production`
#     GitHub Environment, so its protection rules apply;
#   - is IDEMPOTENT AND REFUSES TO ROTATE — if the secret already exists it
#     exits successfully without touching it. There is deliberately no force
#     input; if rotation is ever truly required (pre-launch only!), do it by
#     hand with `wrangler secret put` so the decision cannot be a misclick;
#   - generates the value in-job (64 random bytes, base64) and never prints
#     it. The salt is not a key that needs escrow: it exists only inside
#     Cloudflare, exactly like the other osn-api Worker secrets.
name: Set OSN_PAIRWISE_SALT (osn-api, one-shot)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  set-salt:
    name: Set pairwise salt if absent
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install

      - name: Set OSN_PAIRWISE_SALT if absent (never rotates)
        working-directory: osn/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if bunx wrangler secret list --env production | grep -q '"OSN_PAIRWISE_SALT"'; then
            echo "OSN_PAIRWISE_SALT is already set — refusing to rotate. Nothing to do."
            exit 0
          fi
          echo "OSN_PAIRWISE_SALT is absent — generating and setting (value is never printed)."
          SALT="$(openssl rand -base64 64 | tr -d '\n')"
          echo "::add-mask::${SALT}"
          printf '%s' "${SALT}" | bunx wrangler secret put OSN_PAIRWISE_SALT --env production
          echo "Done. osn-api will pick the secret up without a redeploy."
